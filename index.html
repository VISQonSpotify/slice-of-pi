<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8" />
  <title>Slice of Pi - Pi Network Coin Flip</title>
  <style>
    /* Base styles */
    * {
      box-sizing: border-box;
    }
    body, html {
      height: 100%;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f7f5f0;
      color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      user-select: none;
    }
    #appContainer {
      background: #fff;
      border-radius: 16px;
      padding: 40px 30px 50px 30px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.12);
      width: 320px;
      text-align: center;
      animation: fadeIn 0.8s ease forwards;
      display: none; /* Hidden until login */
    }
    h1 {
      margin: 0 0 30px 0;
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: 2px;
      color: #222;
    }
    #coin {
      margin: 0 auto 24px auto;
      width: 100px;
      height: 100px;
      background: #ffd633;
      border-radius: 50%;
      box-shadow: 0 8px 15px rgba(255, 214, 51, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 48px;
      font-weight: 900;
      color: #222;
      cursor: pointer;
      transition: transform 0.3s ease;
      user-select: none;
      perspective: 800px;
    }
    #coin:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 20px rgba(255, 214, 51, 0.7);
    }
    @keyframes flipCoin {
      0% { transform: rotateY(0deg); }
      50% { transform: rotateY(180deg); }
      100% { transform: rotateY(360deg); }
    }
    .flipping {
      animation: flipCoin 1s ease forwards;
      cursor: wait;
    }
    #flipBtn {
      margin-top: 8px;
      padding: 10px 28px;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 5px 8px rgba(0,0,0,0.15);
      transition: background-color 0.25s ease;
      user-select: none;
    }
    #flipBtn:hover:not(:disabled) {
      background-color: #444;
    }
    #flipBtn:disabled {
      background-color: #888;
      cursor: not-allowed;
      box-shadow: none;
    }
    #tipJar {
      margin-top: 14px;
      font-size: 0.95rem;
      color: #555;
      opacity: 0.8;
      transition: opacity 0.4s ease;
      user-select: none;
    }
    #tipJar.blink {
      opacity: 1;
      animation: blinkTip 1.2s infinite;
    }
    @keyframes blinkTip {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    #themeSelector {
      margin-top: 24px;
      font-size: 0.95rem;
      padding: 6px 12px;
      border-radius: 12px;
      border: 1px solid #ccc;
      cursor: pointer;
      user-select: none;
      background: #fff;
      transition: border-color 0.3s ease;
    }
    #themeSelector:focus {
      outline: none;
      border-color: #ffd633;
      box-shadow: 0 0 8px rgba(255,214,51,0.7);
    }
    #adminDashboard {
      margin-top: 36px;
      font-size: 1rem;
      color: #444;
      font-weight: 600;
      text-align: left;
      user-select: none;
    }
    #adminDashboard div {
      margin-top: 8px;
    }
    #modeToggle {
      margin-top: 20px;
      padding: 6px 12px;
      font-size: 0.9rem;
      border-radius: 10px;
      border: 1px solid #aaa;
      background-color: #eee;
      cursor: pointer;
      user-select: none;
      transition: background-color 0.3s ease;
    }
    #modeToggle:hover {
      background-color: #ddd;
    }
    #statusMsg {
      margin-top: 20px;
      font-size: 1rem;
      color: #b33;
      min-height: 1.5em;
      user-select: none;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }
    /* Login container */
    #loginContainer {
      background: #fff;
      border-radius: 16px;
      padding: 40px 30px 50px 30px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.12);
      width: 320px;
      text-align: center;
      animation: fadeIn 0.8s ease forwards;
    }
    #loginBtn {
      padding: 15px 30px;
      font-size: 1.2rem;
      border-radius: 24px;
      background-color: #ffd633;
      border: none;
      cursor: pointer;
      font-weight: 700;
      color: #222;
      box-shadow: 0 8px 16px rgba(255, 214, 51, 0.5);
      transition: background-color 0.3s ease;
      user-select: none;
    }
    #loginBtn:hover {
      background-color: #e6c528;
    }
  </style>
</head>
<body>
  <div id="loginContainer" role="main" aria-label="Login to Slice of Pi">
    <h1>Slice of Pi</h1>
    <button id="loginBtn" aria-label="Connect Pi Wallet to login">Connect Pi Wallet to Login</button>
  </div>

  <div id="appContainer" role="main" aria-label="Slice of Pi coin flip game" tabindex="-1">
    <h1>Slice of Pi</h1>

    <div id="coin" tabindex="0" aria-label="Coin showing π symbol" role="button" title="Click to flip coin">π</div>

    <button id="flipBtn" aria-live="polite" aria-label="Flip Coin Button" disabled>Flip Coin</button>

    <div id="tipJar" aria-live="polite">Tip Jar: 0 π</div>

    <select id="themeSelector" aria-label="Select theme">
      <option value="light" selected>Light Theme</option>
      <option value="dark">Dark Theme</option>
    </select>

    <button id="modeToggle" aria-label="Toggle Testnet/Mainnet">Switch to Testnet</button>

    <div id="adminDashboard" aria-live="polite" aria-atomic="true" aria-relevant="text">
      <div>Total Revenue: 0 π</div>
      <div>Liquidity Pool: 0 π</div>
      <div>User Wallet: <span id="userWallet">Not connected</span></div>
      <div>Mode: <span id="currentMode">Mainnet</span></div>
    </div>

    <div id="statusMsg" role="alert" aria-live="assertive"></div>
  </div>

  <script>
    let tipJarAmount = 0;
    let totalRevenue = 0;
    let liquidityPool = 1;
    let flipping = false;
    let userAddress = null;
    let testnet = false;

    const loginContainer = document.getElementById('loginContainer');
    const loginBtn = document.getElementById('loginBtn');
    const appContainer = document.getElementById('appContainer');
    const coin = document.getElementById('coin');
    const flipBtn = document.getElementById('flipBtn');
    const tipJar = document.getElementById('tipJar');
    const themeSelector = document.getElementById('themeSelector');
    const adminDashboard = document.getElementById('adminDashboard');
    const userWalletSpan = document.getElementById('userWallet');
    const modeToggle = document.getElementById('modeToggle');
    const currentModeSpan = document.getElementById('currentMode');
    const statusMsg = document.getElementById('statusMsg');

    function applyTheme(theme) {
      if (theme === 'dark') {
        document.body.style.backgroundColor = '#121212';
        document.body.style.color = '#eee';
        coin.style.backgroundColor = '#ffcc00';
        coin.style.color = '#222';
        flipBtn.style.backgroundColor = '#333';
        flipBtn.style.color = '#eee';
      } else {
        document.body.style.backgroundColor = '#f7f5f0';
        document.body.style.color = '#222';
        coin.style.backgroundColor = '#ffd633';
        coin.style.color = '#222';
        flipBtn.style.backgroundColor = '#222';
        flipBtn.style.color = '#fff';
      }
    }

    themeSelector.addEventListener('change', e => applyTheme(e.target.value));
    applyTheme('light');

    function updateAdminDashboard() {
      adminDashboard.children[0].textContent = `Total Revenue: ${totalRevenue.toFixed(2)} π`;
      adminDashboard.children[1].textContent = `Liquidity Pool: ${liquidityPool.toFixed(2)} π`;
      userWalletSpan.textContent = userAddress || 'Not connected';
      currentModeSpan.textContent = testnet ? 'Testnet' : 'Mainnet';
    }

    function updateTipJar() {
      tipJar.textContent = `Tip Jar: ${tipJarAmount.toFixed(2)} π`;
      tipJar.classList.add('blink');
      setTimeout(() => tipJar.classList.remove('blink'), 1200);
    }

    async function loginUser() {
      statusMsg.textContent = '';
      if (!window.Pi) {
        statusMsg.textContent = 'Pi SDK NOT found. Please open Slice of Pi inside the Pi Browser app.';
        console.error('Pi SDK NOT found');
        return false;
      }
      try {
        statusMsg.textContent = 'Checking authorization...';
        const isAuthorized = await window.Pi.isAuthorized();
        if (!isAuthorized) {
          statusMsg.textContent = 'Requesting Pi wallet authorization...';
          await window.Pi.requestAuthorization();
        }
        userAddress = await window.Pi.getAccount();
        statusMsg.textContent = `Logged in as ${userAddress}`;
        console.log('User address:', userAddress);
        updateAdminDashboard();
        // Show main UI
        loginContainer.style.display = 'none';
        appContainer.style.display = 'block';
        flipBtn.disabled = false;
        flipBtn.textContent = 'Flip Coin';
        appContainer.focus();
        return true;
      } catch (err) {
        statusMsg.textContent = 'Pi wallet authorization failed or was cancelled.';
        alert('Pi wallet authorization failed or was cancelled.');
        console.error('Login error:', err);
        return false;
      }
    }

    async function sendPiTransaction(to, amount, memo) {
      if (testnet) {
        statusMsg.textContent = `[TESTNET] Simulating sending ${amount} Pi to ${to}`;
        console.log(`[TESTNET] Sending ${amount} Pi to ${to} with memo "${memo}"`);
        return true;
      }
      if (!window.Pi) {
        statusMsg.textContent = 'Pi SDK not found. Use Pi Browser.';
        alert('Pi SDK not found. Use Pi Browser.');
        return false;
      }
      try {
        statusMsg.textContent = `Sending ${amount} Pi to ${to}...`;
        const res = await window.Pi.sendTransaction({
          recipient: to,
          amount: amount,
          memo: memo
        });
        statusMsg.textContent = 'Transaction successful!';
        console.log('Transaction sent:', res);
        return true;
      } catch (e) {
        statusMsg.textContent = 'Transaction failed or cancelled.';
        alert('Transaction failed or cancelled.');
        console.error('Transaction error:', e);
        return false;
      }
    }

    async function flipCoin() {
      if (flipping) return;
      flipping = true;
      flipBtn.disabled = true;
      coin.classList.add('flipping');

      try {
        // Send bet of 0.01 Pi to liquidity pool wallet
        const liquidityWallet = 'GCQGGFVKWEIV2L6QV3SSGVF3V6KYS4ARBHHAGOSPBA3CCPWONIYCU6FX';
        const betAmount = 0.01;

        const betSuccess = await sendPiTransaction(liquidityWallet, betAmount, 'Slice of Pi bet');
        if (!betSuccess) throw new Error('Bet transaction failed');

        // Wait flip animation
        await new Promise(r => setTimeout(r, 1000));

        // Determine random outcome
        const outcome = Math.random() < 0.5 ? 'Heads' : 'Tails';
        alert(`Coin landed on ${outcome}!`);

        // Simulated payout (payout > bet to simulate win)
        const payoutAmount = 0.018;
        const payoutSuccess = await sendPiTransaction(userAddress, payoutAmount, 'Slice of Pi payout');
        if (!payoutSuccess) throw new Error('Payout transaction failed');

        // Update local state
        totalRevenue += betAmount;
        tipJarAmount += 0.005;
        liquidityPool += (betAmount - payoutAmount);
        updateTipJar();
        updateAdminDashboard();

      } catch (error) {
        statusMsg.textContent = 'Error during coin flip: ' + error.message;
        alert('Error during coin flip: ' + error.message);
      } finally {
        flipping = false;
        flipBtn.disabled = false;
        coin.classList.remove('flipping');
      }
    }

    modeToggle.addEventListener('click', () => {
      testnet = !testnet;
      modeToggle.textContent = testnet ? 'Switch to Mainnet' : 'Switch to Testnet';
      updateAdminDashboard();
      console.log(`Switched to ${testnet ? 'Testnet' : 'Mainnet'}`);
    });

    // Only login when user clicks login button
    loginBtn.addEventListener('click', loginUser);

    // Flip coin or connect wallet on flip button click (only works after login)
    flipBtn.addEventListener('click', flipCoin);

    coin.addEventListener('click', flipCoin);
  </script>
</body>
</html>
