<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Slice of Pi - Minimal</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f5f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    #loginContainer, #appContainer {
      background: white;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.15);
      text-align: center;
      width: 320px;
    }
    #coin {
      font-size: 72px;
      margin: 20px 0;
      cursor: pointer;
      user-select: none;
      display: inline-block;
      transition: transform 1s ease;
    }
    #flipBtn {
      padding: 12px 30px;
      font-size: 16px;
      background: #ffd633;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
    }
    #flipBtn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .flip-animation {
      transform: rotateY(360deg);
    }
    #message {
      margin-top: 15px;
      color: #d33;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div id="loginContainer">
    <h1>Slice of Pi</h1>
    <button id="loginBtn">Connect Pi Wallet to Login</button>
    <div id="message"></div>
  </div>

  <div id="appContainer" style="display:none;">
    <h1>Slice of Pi</h1>
    <div id="coin" aria-label="Coin showing π symbol" role="button" tabindex="0">π</div>
    <br />
    <button id="flipBtn" disabled>Flip Coin</button>
    <div id="message"></div>
  </div>

  <script>
    const loginBtn = document.getElementById('loginBtn');
    const loginContainer = document.getElementById('loginContainer');
    const appContainer = document.getElementById('appContainer');
    const coin = document.getElementById('coin');
    const flipBtn = document.getElementById('flipBtn');
    const message = document.querySelectorAll('#message')[1]; // message in appContainer

    let userAddress = null;
    let flipping = false;

    function showMessage(text, isError = false) {
      message.textContent = text;
      message.style.color = isError ? '#d33' : '#080';
    }

    async function loginUser() {
      if (!window.Pi) {
        alert('Please open this app inside the Pi Browser.');
        return;
      }
      try {
        const authorized = await window.Pi.isAuthorized();
        if (!authorized) {
          await window.Pi.requestAuthorization();
        }
        userAddress = await window.Pi.getAccount();
        console.log('Logged in as:', userAddress);

        loginContainer.style.display = 'none';
        appContainer.style.display = 'block';
        flipBtn.disabled = false;
        showMessage('Logged in! Ready to flip.');
      } catch (error) {
        console.error(error);
        showMessage('Login failed or cancelled.', true);
      }
    }

    async function sendPiTransaction(to, amount, memo) {
      if (!window.Pi) {
        showMessage('Pi SDK not found.', true);
        return false;
      }
      try {
        const res = await window.Pi.sendTransaction({
          recipient: to,
          amount: amount,
          memo: memo
        });
        console.log('Transaction result:', res);
        return true;
      } catch (error) {
        console.error(error);
        showMessage('Transaction failed or cancelled.', true);
        return false;
      }
    }

    async function flipCoin() {
      if (flipping) return;
      flipping = true;
      flipBtn.disabled = true;
      showMessage('');

      // Animate coin flip
      coin.classList.add('flip-animation');
      setTimeout(() => coin.classList.remove('flip-animation'), 1000);

      // Simulate bet transaction
      const liquidityWallet = 'GCQGGFVKWEIV2L6QV3SSGVF3V6KYS4ARBHHAGOSPBA3CCPWONIYCU6FX';
      const betAmount = '0.01';

      showMessage('Sending bet transaction...');
      const betSuccess = await sendPiTransaction(liquidityWallet, betAmount, 'Slice of Pi bet');
      if (!betSuccess) {
        flipping = false;
        flipBtn.disabled = false;
        return;
      }

      // Random coin outcome
      const outcome = Math.random() < 0.5 ? 'Heads' : 'Tails';
      alert(`Coin landed on ${outcome}!`);

      // Simulate payout transaction (win)
      const payoutAmount = '0.018';
      showMessage('Sending payout transaction...');
      const payoutSuccess = await sendPiTransaction(userAddress, payoutAmount, 'Slice of Pi payout');
      if (!payoutSuccess) {
        flipping = false;
        flipBtn.disabled = false;
        return;
      }

      showMessage('Flip complete! You won.');

      flipping = false;
      flipBtn.disabled = false;
    }

    loginBtn.addEventListener('click', loginUser);
    flipBtn.addEventListener('click', flipCoin);
    coin.addEventListener('click', flipCoin);
  </script>
</body>
</html>
